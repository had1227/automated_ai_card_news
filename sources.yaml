# --------------------------
# 검색 기반 수집 (핵심)
# --------------------------

web_search:
  enabled: false
  max_results_per_keyword: 3

  search_sites:
    # 글로벌
    - openai.com
    - anthropic.com
    - huggingface.co
    - ai.meta.com
    - mistral.ai
    - blogs.microsoft.com
    - github.com

    # NVIDIA
    - nvidia.com
    - developer.nvidia.com
    - research.nvidia.com

    # 중국
    - qwenlm.github.io
    - moonshot.cn
    - zhipuai.cn
    - deepseek.com
    - qwen.aliyun.com
    - ai.baidu.com
    - ai.tencent.com
    - volcengine.com
    - mimo.ai
    
google_news:
  queries:
    - "AI model release"
    - "LLM announcement"
    - "AI startup funding"
    - "AI acquisition"
    - "AI policy regulation"
    
