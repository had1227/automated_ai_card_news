name: Weekly AI news email

on:
  workflow_dispatch:
  schedule:
    # Monday 08:00 Asia/Seoul. GitHub cron is UTC, so this is Sunday 23:00 UTC.
    - cron: '0 23 * * 0'

jobs:
  send-weekly-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run tests
        run: python -m pytest -q

      - name: Build weekly news HTML
        run: python run_pipeline.py --all

      - name: Send Gmail digest
        run: python send_email.py

      - name: Upload generated diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-news-output-${{ github.run_id }}
          path: |
            data/items.json
            data/top_news.json
            data/news_facts.json
            output/news.html
          if-no-files-found: warn
          retention-days: 7
